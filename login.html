<!DOCTYPE html>
<html>
<head>
  <title>Login - Clean India</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f4faf6;">

<div style="background:white;padding:30px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.1);width:300px;">
  <h2 style="text-align:center;">Login</h2>

  <input type="email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">
  <input type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

  <button style="width:100%;padding:10px;background:#2e8b57;color:white;border:none;border-radius:8px;">
    Login
  </button>

  <p style="text-align:center;margin-top:10px;">New user? Sign up</p>
</div>

</body>
</html>
